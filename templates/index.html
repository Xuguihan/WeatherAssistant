<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 天气助手</title>
    <!-- 引入 Tailwind CSS 进行美化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 让换行符 \n 在网页上生效 */
        .whitespace-pre-line { white-space: pre-line; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-xl shadow-lg max-w-md w-full p-6">
        <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">☁️ AI 天气助手</h1>

        <!-- 输入表单 -->
        <form action="/get_advice" method="post" class="flex gap-2 mb-6">
            <input type="text" name="city" placeholder="请输入名称（如：上海或上海徐汇区）"
                class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                required>
            <button type="submit"
                class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                查询
            </button>
        </form>

        <!-- 显示 AI 建议 (如果存在) -->
        {% if advice %}
        <div class="bg-green-50 border border-green-200 rounded-lg p-4 text-gray-700 text-sm whitespace-pre-line leading-relaxed">
            <h3 class="font-bold text-green-800 mb-2">天气助手建议：</h3>
            {{ advice }}
        </div>
        {% endif %}
    </div>
</body>
</html>
